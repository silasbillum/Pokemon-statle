services:
  frontend:
    build:
      context: ./statle
      dockerfile: Dockerfile.frontend
    ports:
      - "3303:3303"
    environment:
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./statle/Api
      dockerfile: Dockerfile
    ports:
      - "5055:5055"
    volumes:
      - ./statle/DataProtection-Keys:/root/.aspnet/DataProtection-Keys
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5055
      - ConnectionStrings__db=${ConnectionStrings__db}
      - Jwt__SecretKey=${Jwt__SecretKey}
      - Jwt__Issuer=${Jwt__Issuer}
      - Jwt__Audience=${Jwt__Audience}
      - Jwt__ExpiryMinutes=${Jwt__ExpiryMinutes}
    restart: unless-stopped