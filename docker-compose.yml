version: '3.8'
services:
  backend:
    build:
      context: ./statle/Api
      dockerfile: dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    # Uncomment and configure if you add a database
    # depends_on:
    #   - db

  frontend:
    build:
      context: ./statle
      dockerfile: dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

