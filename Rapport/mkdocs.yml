# Svendeprøve – Produkt rapport (MkDocs + Material)
# Kør lokalt: pip install -r requirements-docs.txt && mkdocs serve

site_name: Svendeprøve · H6
site_description: Dokumentation og skabeloner til MAGS svendeprøve (produkt- og procesrapport)
site_author: Dit navn

theme:
  name: material
  language: da
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Skift til mørk tilstand
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Skift til lys tilstand
  font:
    text: DM Sans
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  favicon: assets/favicon.svg

plugins:
  - search:
      lang:
        - da
        - en
  - mermaid2
  # Skal stå sidst: samler hele sitet til én side (PDF-venlig). /hele-sitet/
  - print-site:
      add_to_navigation: true
      print_page_title: "Hele sitet (PDF)"
      print_page_basename: "hele-sitet"
      add_table_of_contents: true
      toc_title: "Indhold"
      toc_depth: 4
      enumerate_headings: true
      add_cover_page: true
      cover_page_template: docs/templates/print_cover.tpl
      add_print_site_banner: true

extra:
  generator: false
  social:
    - icon: fontawesome/solid/graduation-cap
      link: https://mercantec.notion.site/h6
      name: H6 på Mercantec

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/hele-sitet-print-footer.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  # Gør :material-*: ikoner i Markdown (fx knappen på forsiden)
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Start: index.md
  - H6-forløbet:
      - Overblik: forlobet/overblik.md
      - Tidsplan & Gantt: forlobet/tidsplan.md
      - Formelle krav: forlobet/formelle-krav.md
      - Karakterer: forlobet/karakterer.md
      - Eksamen: forlobet/eksamen.md
      - AI-politik: forlobet/ai-politik.md
      - Nyttige links: forlobet/links.md
  - Skabelon · Produkt:
      - Forside & metadata: skabelon/01-forside-metadata.md
      - Indledning: skabelon/02-indledning.md
      - Produktbeskrivelse: skabelon/03-produktbeskrivelse.md
      - Krav & mål: skabelon/04-krav-og-maal.md
      - Planlægning: skabelon/05-planlaegning.md
      - Udførelse: skabelon/06-udfoerelse.md
      - Resultat & evaluering: skabelon/07-resultat-evaluering.md
      - Refleksion: skabelon/08-refleksion.md
      - Bilag & kilder: skabelon/09-bilag.md
  - Skabelon · Proces:
      - Projektplanlægning & Gantt: skabelon-proces/01-projektplanlaegning.md
      - Logbog: skabelon-proces/02-logbog.md
      - Konklusion: skabelon-proces/03-konklusion.md
